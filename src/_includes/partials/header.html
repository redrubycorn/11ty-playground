{% if header %}
    <div class="container-fluid bg-header">
        <div class="container">
            <div class="row">
                <div class="col-{% if isPost %}lg-8 offset-lg-2{% else %}12{% endif %} my-4">
                    {% if headerTitle %}<h2 class="display-6">{{ headerTitle }}</h2>{% endif %}
                    {% if headerSubtitle %}<h3 class="lead">{{ headerSubtitle }}</h3>{% endif %}
                </div>
            </div>
        </div>
    </div>
{% endif %}
