<div class="bg-white custom-sticky-top">
    <h5 class="text-center text-lg-start">Categories</h5>
    <div class="category-scrollbar gap-1 d-flex flex-lg-column overflow-auto pb-1 mb-2">
        {% for tag, val in collections.tagList %}
            {% set tagUrl %}/tag/{{ tag | slug }}/{% endset %}
            <div><a class="btn btn-sm btn-outline-secondary text-muted" href="{{ tagUrl }}">#{{ tag }}</a></div>
        {% endfor %}
    </div>
</div>
