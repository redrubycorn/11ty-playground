<!-- POSTLIST -->

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 gx-3 gy-3">
    {% for item in feedItems %}
        {% set numberOfImages = item.data.images | length %}
        <div class="col d-flex align-items-stretch">
            <div class="card">

                <!-- carousel -->
                <div id="{{ item.data.title | slug }}" class="carousel slide">

                    <div class="carousel-indicators">
                        {% for i in range(0, numberOfImages) %}
                            <!-- <button type="button" data-bs-target="#carousel1" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button> -->
                            <button type="button" data-bs-target="#{{ item.data.title | slug }}" data-bs-slide-to="{{ i }}" aria-label="Slide {{ i }}" {% if (i === 0) %}class="active" aria-current="true"{% endif %}></button>
                        {% endfor %}
                    </div>

                    <div class="carousel-inner">
                        {% for image in item.data.images %}
                            <div class="carousel-item {% if (loop.index0 === 0) %}active{% endif %}">
                                <img src="{{ image }}" class="d-block w-100 card-image-top" alt="project image">
                            </div>
                        {% endfor %}
                    </div>

                    <button class="carousel-control-prev" type="button" data-bs-target="#{{ item.data.title | slug }}" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>

                    <button class="carousel-control-next" type="button" data-bs-target="#{{ item.data.title | slug }}" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>

                </div>

                <!-- card body -->
                <div class="card-body">
                    <h5 class="card-title">{{ item.data.title }}</h5>
                    <p class="card-text">{{ item.data.subtitle }}</p>
                </div>

                <!-- footer button -->
                <div class="card-footer bg-transparent d-grid px-0 py-0">
                    <a href="{{ item.url }}" class="btn btn-primary rounded-top-0">View project</a>
                </div>

            </div>
        </div>
    {% endfor %}
</div>
