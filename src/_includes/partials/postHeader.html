<div class="container-fluid bg-light">
    <div class="container py-3">
        <div class="row">
            <div class="col-lg-8 offset-lg-2">
                {% if title %}<h2 class="display-6 py-0 my-0">{{ title }}</h2>{% endif %}
                {% if subtitle %}<p class="subtitle lead py-0 my-0">{{ subtitle }}</p>{% endif %}
                {% if summary %}<p class="">{{ summary }}</p>{% endif %}
                {% if tags %}
                    {% for tag in tags %}
                        <a class="btn btn-sm btn-outline-secondary" href="/tag/{{ tag | slug }}">#{{ tag }}</a>
                    {% endfor %}
                {% endif %}
            </div>
        </div>
    </div>
</div>
